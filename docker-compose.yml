services:
  esc-app:
    build:
      context: .
      args:
        VITE_CONVEX_URL: http://127.0.0.1:3210
    image: esc-app:local
    ports:
      - "8080:80"

  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    environment:
      CONVEX_INSTANCE_NAME: esc-2026
      CONVEX_CLOUD_ORIGIN: http://localhost:3210
      CONVEX_SITE_ORIGIN: http://localhost:3211
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex-data:/convex/data

  convex-deploy:
    build:
      context: .
      dockerfile: Dockerfile.convex-deploy
    image: esc-app-convex-deploy:local
    environment:
      CONVEX_URL: ${CONVEX_URL:-}
      CONVEX_SELF_HOSTED_URL: ${CONVEX_SELF_HOSTED_URL:-}
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${CONVEX_SELF_HOSTED_ADMIN_KEY:?Set CONVEX_SELF_HOSTED_ADMIN_KEY}
    restart: "no"
    profiles:
      - deploy

volumes:
  convex-data:
